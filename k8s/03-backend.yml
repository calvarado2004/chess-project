---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: chess-project
  labels:
    app: backend
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chess-project
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/chess-project/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: port
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: node-env
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: jwt-refresh-secret
            - name: JWT_EXPIRES_IN
              value: "15m"
            - name: JWT_REFRESH_EXPIRES_IN
              value: "7d"
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: cors-origin
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
