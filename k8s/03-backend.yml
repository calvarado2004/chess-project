---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: chess-project
  labels:
    app: backend
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chess-project
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/chess-project/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: port
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: node-env
            - name: DB_SSL
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://redis.chess-project.svc.cluster.local:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: jwt-refresh-secret
            - name: JWT_EXPIRES_IN
              value: "15m"
            - name: JWT_REFRESH_EXPIRES_IN
              value: "7d"
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: cors-origin
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: chess-project
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: chess-project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
