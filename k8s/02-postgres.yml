---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: chess-project
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: px-csi-db
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chess-project
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres
  clusterIP: None  # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: chess-project
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      restartPolicy: Always
      containers:
        - name: postgres
          image: postgres:18-alpine
          imagePullPolicy: IfNotPresent
          # Run idempotent init script before starting PostgreSQL
          command:
            - /bin/sh
            - -c
            - |
              if [ -f /db-init/init.sql ]; then
                echo 'Running DB init...';
                psql -v ON_ERROR_STOP=1 \
                  -U "${POSTGRES_USER:-chess}" \
                  -d "${POSTGRES_DB:-chess}" \
                  -f /db-init/init.sql;
                echo 'DB init complete.';
              fi;
              exec docker-entrypoint.sh postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chess-project-secrets
                  key: postgres-password
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8"
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chess
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chess
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
              subPath: pgdata
            - name: db-init-volume
              mountPath: /db-init
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: db-init-volume
          configMap:
            name: db-init
