---
apiVersion: v1
kind: Service
metadata:
  name: chess
  namespace: chess-project
  labels:
    app: chess
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: chess
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess
  namespace: chess-project
  labels:
    app: chess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chess
  template:
    metadata:
      labels:
        app: chess
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chess
      containers:
        - name: chess
          image: image-registry.openshift-image-registry.svc:5000/chess-project/chess:latest
          imagePullPolicy: Always
          env:
            - name: BACKEND_HOST
              value: "backend.chess-project.svc.cluster.local"
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: chess
  namespace: chess-project
spec:
  to:
    kind: Service
    name: chess
    weight: 100
  port:
    targetPort: 80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chess
  namespace: chess-project
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: chess
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chess
  namespace: chess-project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chess
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
