apiVersion: v1
kind: Secret
metadata:
  name: chess-project-secrets
  namespace: chess-project
type: Opaque
stringData:
  # Database
  postgres-user: chess
  postgres-password: chess
  postgres-db: chess
  database-url: "postgresql://chess:chess@postgres:5432/chess"

  # JWT — replace these with real secrets in production!
  jwt-secret: "change-me-generate-a-random-secret"
  jwt-refresh-secret: "change-me-generate-another-random-secret"

  # Server
  port: "3000"
  node-env: production

  # CORS — update to your OpenShift frontend route
  cors-origin: "https://chess-chess-project.<your-cluster-domain>"
